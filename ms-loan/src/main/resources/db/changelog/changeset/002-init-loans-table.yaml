databaseChangeLog:
  - changeSet:
      id: 2
      author: Mamedli Nuran
      changes:
        - createTable:
            tableName: loans
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: customer_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: amount
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: interest_rate
                  type: DECIMAL(5,2)
                  constraints:
                    nullable: false

              - column:
                  name: term_months
                  type: INTEGER
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: applied_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: approved_at
                  type: TIMESTAMP

              - column:
                  name: disbursed_at
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: loans
            baseColumnNames: customer_id
            referencedTableName: customers
            referencedColumnNames: id
            constraintName: fk_loans_customer

        - sql:
            dbms: postgresql
            sql: ALTER TABLE loans ADD CONSTRAINT chk_loan_status CHECK (status IN ('PENDING','APPROVED','DISBURSED','CLOSED','REJECTED'))

        - sql:
            dbms: oracle
            sql: ALTER TABLE loans ADD CONSTRAINT chk_loan_status CHECK (status IN ('PENDING','APPROVED','DISBURSED','CLOSED','REJECTED'))

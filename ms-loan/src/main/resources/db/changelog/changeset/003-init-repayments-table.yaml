databaseChangeLog:
  - changeSet:
      id: 3
      author: Mamedli Nuran
      changes:
        - createTable:
            tableName: repayments
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: loan_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: amount
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: paid_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: repayments
            baseColumnNames: loan_id
            referencedTableName: loans
            referencedColumnNames: id
            constraintName: fk_repayments_loan
